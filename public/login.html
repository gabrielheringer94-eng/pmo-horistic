<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · PMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0d0810; --bg-card: rgba(243,235,230,0.045);
    --border: rgba(243,235,230,0.12); --border-strong: rgba(243,235,230,0.22);
    --ink-0: #f3ebe6; --ink-2: rgba(243,235,230,0.55); --ink-3: rgba(243,235,230,0.32);
    --pink: #ff2d8d; --purple-mid: #c43689; --danger: #ff4d6d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-0); color: var(--ink-0); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    font-family: 'Inter', sans-serif;
    background-image:
      radial-gradient(120% 70% at 100% -10%, rgba(255,45,141,0.16) 0%, rgba(196,54,137,0.06) 22%, rgba(13,8,16,0) 55%),
      radial-gradient(80% 60% at -10% 110%, rgba(138,31,110,0.18) 0%, rgba(13,8,16,0) 55%),
      linear-gradient(180deg, #0d0810 0%, #120a14 100%);
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px 32px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--pink);
    margin-bottom: 14px; font-weight: 600;
  }
  h1 {
    font-family: 'Inter Tight', sans-serif; font-size: 30px;
    font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px;
  }
  h1 .accent { background: linear-gradient(90deg, var(--pink), var(--purple-mid)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--ink-2); font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin: 14px 0 6px; font-weight: 600; }
  input { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--ink-0); border-radius: 8px; padding: 12px 14px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--pink); }
  button {
    width: 100%; margin-top: 22px; padding: 13px;
    background: linear-gradient(180deg, var(--pink), #e51877); color: white;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
    transition: filter 0.18s;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .err { margin-top: 14px; color: var(--danger); font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Sales Consulting</div>
    <h1>Acesso ao <span class="accent">painel</span></h1>
    <div class="sub">Use suas credenciais para entrar.</div>
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" required>
      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button type="submit" id="btn">Entrar</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase-client.js"></script>
  <script>
    (async () => {
      const { data } = await window.sb.auth.getSession();
      if (data.session) location.replace('./index.html');
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn'); btn.disabled = true;
      const err = document.getElementById('err'); err.textContent = '';
      const { error } = await window.sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      btn.disabled = false;
      if (error) { err.textContent = error.message; return; }
      location.replace('./index.html');
    });
  </script>
</body>
</html>
