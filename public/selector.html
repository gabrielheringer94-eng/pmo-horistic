<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecionar projeto · PMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0d0810; --bg-card: rgba(243,235,230,0.045);
    --border: rgba(243,235,230,0.10); --border-strong: rgba(243,235,230,0.22);
    --ink-0: #f3ebe6; --ink-2: rgba(243,235,230,0.55); --ink-3: rgba(243,235,230,0.32);
    --pink: #ff2d8d; --purple-mid: #c43689;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-0); color: var(--ink-0); min-height: 100vh; padding: 40px 36px;
    font-family: 'Inter', sans-serif;
    background-image:
      radial-gradient(120% 70% at 100% -10%, rgba(255,45,141,0.16) 0%, rgba(196,54,137,0.06) 22%, rgba(13,8,16,0) 55%),
      linear-gradient(180deg, #0d0810 0%, #120a14 100%);
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
  .top a { color: var(--ink-2); cursor: pointer; text-decoration: none; }
  .top a:hover { color: var(--pink); }
  h1 { font-family: 'Inter Tight', sans-serif; font-size: 44px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  h1 .accent { background: linear-gradient(90deg, var(--pink), var(--purple-mid)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--ink-2); font-size: 15px; margin-bottom: 36px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; cursor: pointer; transition: all 0.2s; }
  .card:hover { border-color: var(--pink); transform: translateY(-2px); }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
  .name { font-family: 'Inter Tight', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.015em; margin-bottom: 8px; }
  .org { color: var(--ink-2); font-size: 13px; }
  .role { display: inline-block; margin-top: 14px; padding: 3px 8px; background: rgba(255,45,141,0.14); color: var(--pink); border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>Sales Consulting · seletor</div>
      <div>
        <a href="./admin.html" id="navAdmin" style="display:none;">Admin</a>
        &nbsp;·&nbsp;
        <a id="navLogout">Sair</a>
      </div>
    </div>
    <h1>Escolha o <span class="accent">projeto.</span></h1>
    <div class="sub">Você tem acesso aos painéis abaixo.</div>
    <div class="grid" id="grid"><div style="color:var(--ink-2);">Carregando…</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/pmo-auth.js"></script>
  <script>
    (async () => {
      const sess = await window.pmoAuth.requireSession(); if (!sess) return;
      document.getElementById('navLogout').addEventListener('click', (e) => { e.preventDefault(); window.pmoAuth.signOut(); });

      const mems = await window.pmoAuth.loadMemberships();
      if (mems.some(m => m.role === 'admin')) document.getElementById('navAdmin').style.display = '';

      const projs = await window.pmoAuth.loadAccessibleProjects();
      const grid = document.getElementById('grid');
      if (!projs.length) { grid.innerHTML = '<div style="color:var(--ink-2);">Sem projetos disponíveis.</div>'; return; }
      grid.innerHTML = projs.map(p => {
        const mem = mems.find(m => m.org_id === p.org_id);
        const role = mem ? mem.role : '';
        return `
          <div class="card" onclick="location.href='./pmo.html?project=${p.id}'">
            <div class="tag">${(p.organizations?.name || '').toUpperCase()}</div>
            <div class="name">${p.name}</div>
            <div class="org">Início: ${p.start_date} · ${p.total_days} dias</div>
            <div class="role">${role}</div>
          </div>`;
      }).join('');
    })();
  </script>
</body>
</html>
